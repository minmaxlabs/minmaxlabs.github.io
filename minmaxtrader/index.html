<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MinMaxTrader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:           hsl(230, 25%,  6%);
      --card:         hsl(230, 25%,  8%);
      --border:       hsl(230, 25%, 14%);
      --secondary:    hsl(230, 25%, 14%);
      --fg:           hsl(210, 40%, 98%);
      --fg-muted:     hsl(215, 20%, 55%);
      --primary:      hsl(180, 100%, 50%);
      --primary-10:   hsla(180, 100%, 50%, 0.10);
      --primary-20:   hsla(180, 100%, 50%, 0.20);
      --primary-30:   hsla(180, 100%, 50%, 0.30);
      --accent:       hsl(280, 100%, 65%);
      --red:          hsl(0, 84%, 60%);
      --red-10:       hsla(0, 84%, 60%, 0.10);
      --red-30:       hsla(0, 84%, 60%, 0.30);
      --border-half:  hsla(230, 25%, 40%, 0.25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
    }

    /* ── Sidebar ── */
    .sidebar {
      display: none;
      width: 224px;
      flex-shrink: 0;
      flex-direction: column;
      background: var(--card);
      border-right: 1px solid var(--border);
    }
    @media (min-width: 768px) { .sidebar { display: flex; } }

    .sidebar-logo {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }
    .sidebar-logo svg { color: var(--primary); flex-shrink: 0; }
    .logo-text { font-weight: 700; font-size: 15px; letter-spacing: 0.12em; color: var(--primary); }
    .logo-text span { color: var(--fg); }

    .sidebar-nav { flex: 1; padding: 16px 8px; display: flex; flex-direction: column; gap: 2px; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      color: var(--fg-muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-decoration: none;
      user-select: none;
    }
    .nav-item:hover { background: var(--secondary); color: var(--fg); }
    .nav-item.active {
      background: var(--primary-10);
      color: var(--primary);
      border: 1px solid var(--primary-30);
    }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--fg-muted);
    }
    .sidebar-footer-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .status-dot { display: inline-flex; align-items: center; color: var(--primary); gap: 6px; }
    .pulse {
      width: 8px; height: 8px; border-radius: 50%; background: var(--primary);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; min-height: 100vh; overflow: hidden; }

    .header {
      height: 56px;
      border-bottom: 1px solid var(--border);
      background: hsla(230, 25%, 8%, 0.5);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-path {
      display: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--fg-muted);
    }
    @media (min-width: 768px) { .header-path { display: block; } }

    .mobile-logo { display: flex; align-items: center; gap: 6px; }
    .mobile-logo svg { color: var(--primary); }
    .mobile-logo-text { font-weight: 700; font-size: 14px; letter-spacing: 0.12em; color: var(--primary); }
    .mobile-logo-text span { color: var(--fg); }
    @media (min-width: 768px) { .mobile-logo { display: none; } }

    .hamburger-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: var(--fg-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .hamburger-btn:hover { color: var(--fg); }
    @media (min-width: 768px) { .hamburger-btn { display: none; } }

    /* NEW SIGNAL button — hidden until write is enabled */
    .new-signal-btn { display: none; }

    /* ── Content ── */
    .content { flex: 1; overflow: auto; padding: 16px; padding-bottom: 80px; }
    @media (min-width: 768px) { .content { padding: 24px; padding-bottom: 24px; } }

    /* ── Mobile bottom nav ── */
    .bottom-nav {
      display: flex;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 64px;
      background: var(--card);
      border-top: 1px solid var(--border);
      z-index: 40;
    }
    @media (min-width: 768px) { .bottom-nav { display: none; } }

    .bottom-nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--fg-muted);
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      transition: color 0.15s;
    }
    .bottom-nav-item.active { color: var(--primary); }
    .bottom-nav-item svg { width: 20px; height: 20px; }

    /* ── Mobile drawer overlay ── */
    .drawer-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
    }
    .drawer-overlay.open { display: flex; }

    .drawer-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
    }
    .drawer {
      position: relative;
      z-index: 1;
      width: 256px;
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .drawer-header {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .drawer-close {
      background: none;
      border: none;
      color: var(--fg-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
    }
    .drawer-close:hover { color: var(--fg); }
    .drawer-nav { flex: 1; padding: 16px 8px; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }

    /* ── Signal cards ── */
    .feed-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .feed-title { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; }
    .feed-count { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--fg-muted); }
    .signal-list { display: flex; flex-direction: column; gap: 8px; max-width: 896px; margin: 0 auto; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .card-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; min-width: 0; }
    .ticker { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 15px; color: var(--fg); }

    .badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 2px 8px;
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }
    .badge-bull { color: var(--primary); border: 1px solid var(--primary-30); background: var(--primary-10); }
    .badge-bear { color: var(--red);     border: 1px solid var(--red-30);     background: var(--red-10); }
    .badge-neu  { color: var(--fg-muted); border: 1px solid var(--border);    background: var(--secondary); }

    .card-date { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--fg-muted); white-space: nowrap; flex-shrink: 0; }

    .card-source { display: flex; align-items: center; gap: 4px; margin-bottom: 8px; }
    .source-author { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); }
    .source-platform { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--fg-muted); text-transform: uppercase; }

    .card-thesis {
      font-size: 14px;
      color: hsla(210, 40%, 98%, 0.80);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-levels {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border-half);
    }
    .level-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--fg-muted); }
    .level-value { font-weight: 700; }
    .level-entry  .level-value { color: var(--fg); }
    .level-stop   .level-value { color: var(--red); }
    .level-target .level-value { color: var(--primary); }
    .level-upside-pos .level-value { color: var(--primary); }
    .level-upside-neg .level-value { color: var(--red); }
    .level-risk   .level-value { color: var(--red); }
    .level-ml { margin-left: auto; }

    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      text-decoration: none;
    }
    .card-link:hover { text-decoration: underline; }
    .card-link svg { width: 12px; height: 12px; }

    /* ── Skeletons ── */
    .skeleton {
      background: var(--secondary);
      border-radius: 8px;
      height: 96px;
      animation: shimmer 1.5s ease-in-out infinite;
    }
    @keyframes shimmer { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

    /* ── Empty / error / stub states ── */
    .empty-state {
      text-align: center;
      padding: 48px 16px;
      color: var(--fg-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .stub-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 16px;
      color: var(--fg-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      gap: 8px;
    }
    .stub-page .stub-path { color: var(--primary); font-size: 16px; }

    /* ── New signal form ── */
    .new-signal-page { max-width: 560px; margin: 0 auto; }
    .new-signal-page h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .new-signal-page h1 svg { color: var(--primary); width: 18px; height: 18px; }
    .form-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
    .form-row { display: grid; gap: 16px; margin-bottom: 16px; }
    .form-row.cols-2 { grid-template-columns: 1fr 1fr; }
    .form-row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .form-field { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--fg-muted); letter-spacing: 0.06em; }
    .form-input, .form-select, .form-textarea {
      background: var(--secondary);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--fg);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      padding: 8px 10px;
      transition: border-color 0.15s;
      width: 100%;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--primary-30);
    }
    .form-textarea { resize: none; min-height: 90px; }
    .form-input.stop-field { border-color: var(--red-30); }
    .form-actions { display: flex; gap: 12px; margin-top: 8px; }
    .btn {
      flex: 1;
      padding: 10px;
      border-radius: 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn-outline { background: transparent; color: var(--fg); border: 1px solid var(--border); }
    .btn-outline:hover { background: var(--secondary); }
    .btn-primary { background: var(--primary-10); border: 1px solid var(--primary-30); color: var(--primary); }
    .btn-primary:hover { background: var(--primary-20); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    @media (max-width: 480px) {
      .form-row.cols-2, .form-row.cols-3 { grid-template-columns: 1fr; }
    }

    /* ── Holdings ── */
    .holdings-page { max-width: 896px; margin: 0 auto; }

    .holdings-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .holdings-header .feed-title { flex-shrink: 0; }
    .holdings-count { flex-shrink: 0; }
    .holdings-search {
      flex: 1;
      min-width: 0;
      max-width: 240px;
    }

    .holdings-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .holdings-table th,
    .holdings-table td {
      padding: 10px 16px;
      text-align: left;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }
    .holdings-table thead th {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--fg-muted);
      border-bottom: 1px solid var(--border);
      user-select: none;
      white-space: nowrap;
    }
    .holdings-table th.sortable {
      cursor: pointer;
      transition: color 0.15s;
    }
    .holdings-table th.sortable:hover { color: var(--fg); }
    .holdings-table th.sortable.active { color: var(--primary); }
    .holdings-table tbody tr { border-top: 1px solid var(--border-half); }
    .holdings-table tbody tr:first-child { border-top: none; }

    .holdings-ticker     { color: var(--fg); font-weight: 700; }
    .holdings-price      { color: var(--fg); }
    .holdings-cost       { color: var(--fg); }
    .holdings-gain-pos   { color: var(--primary); font-weight: 700; }
    .holdings-gain-neg   { color: var(--red);     font-weight: 700; }
    .holdings-gain-zero  { color: var(--fg); }
    .holdings-gain-empty { color: var(--fg-muted); }

    @media (max-width: 480px) {
      .holdings-header { flex-direction: column; align-items: stretch; }
      .holdings-search { max-width: none; }
      .holdings-count  { text-align: right; }
      .holdings-table th, .holdings-table td { padding: 8px 12px; }
    }
  </style>
</head>

  <!-- Main -->
  <main class="main">
    <header class="header">
      <div class="header-left">
        <button class="hamburger-btn" id="hamburger-btn" aria-label="Open menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="mobile-logo">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

    <div class="content">
      <div id="page"></div>

    <nav class="bottom-nav" id="bottom-nav"></nav>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

        label: 'Sources',
        mobileLabel: 'Sources',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
      },
    ];

    /* ── HELPERS ── */
    function escapeHtml(str) {
      return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatDate(val) {
      if (!val) return '';
      try {
        return new Date(val).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      } catch { return val; }
    }

    function formatPrice(val) {
      const n = parseFloat(val);
      return isNaN(n) ? null : n;
    }

    function sentimentBadge(sentiment) {
      const s = (sentiment || '').toLowerCase();
      if (s === 'bullish') return `<span class="badge badge-bull"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>BULL</span>`;
      if (s === 'bearish') return `<span class="badge badge-bear"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>BEAR</span>`;
      return `<span class="badge badge-neu"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg>NEU</span>`;
    }

    function renderLevels(entry, target, stop) {
      const e = formatPrice(entry);
      const t = formatPrice(target);
      const s = formatPrice(stop);
      if (e == null && t == null && s == null) return '';
      let html = '<div class="card-levels">';
      if (e != null) html += `<span class="level-label level-entry">ENTRY: <span class="level-value">$${e.toFixed(2)}</span></span>`;
      if (s != null) html += `<span class="level-label level-stop">STOP: <span class="level-value">$${s.toFixed(2)}</span></span>`;
      if (t != null) html += `<span class="level-label level-target">TARGET: <span class="level-value">$${t.toFixed(2)}</span></span>`;
      if (e != null && t != null) {
        const pct = ((t - e) / e * 100).toFixed(1);
        const cls = t >= e ? 'level-upside-pos' : 'level-upside-neg';
        html += `<span class="level-label ${cls} level-ml">UPSIDE: <span class="level-value">${t >= e ? '+' : ''}${pct}%</span></span>`;
      }
      if (e != null && s != null) {
        const pct = ((s - e) / e * 100).toFixed(1);
        html += `<span class="level-label level-risk">RISK: <span class="level-value">${pct}%</span></span>`;
      }
      return html + '</div>';
    }

    function renderCard(row) {
      const { date, author, source, source_url, ticker, entry, target, stop_loss, sentiment, thesis } = row;
      return `
        <div class="card">
          <div class="card-top">
            <div class="card-left">
              <span class="ticker">${escapeHtml(ticker)}</span>
              ${sentimentBadge(sentiment)}
            </div>
            <span class="card-date">${formatDate(date)}</span>
          </div>
          <div class="card-source">
            <span class="source-author">@${escapeHtml(author)}</span>
            <span class="source-platform">· ${escapeHtml(source)}</span>
          </div>
          <p class="card-thesis">${escapeHtml(thesis)}</p>
          ${renderLevels(entry, target, stop_loss)}
          ${source_url ? `<a class="card-link" href="${escapeHtml(source_url)}" target="_blank" rel="noreferrer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>SOURCE</a>` : ''}
        </div>`;
    }

    /* ── PAGE RENDERERS ── */
    function renderSignals() {
      document.getElementById('page').innerHTML = `
        <div class="signal-list">
          <div class="feed-header">
            <h1 class="feed-title">Signal Feed</h1>
            <span class="feed-count" id="signal-count">— SIGNALS</span>
          </div>
          <div id="feed">${[1,2,3,4].map(() => '<div class="skeleton" style="margin-bottom:8px;"></div>').join('')}</div>
        </div>`;

      Papa.parse(CSV_URL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete(results) {
          const rows = results.data.filter(r => r.ticker);
          document.getElementById('signal-count').textContent = `${rows.length} SIGNALS`;
          const feed = document.getElementById('feed');
          if (!rows.length) {
            feed.innerHTML = '<div class="empty-state">No signals recorded.</div>';
            return;
          }
          const sorted = rows.slice().sort((a, b) => new Date(b.date) - new Date(a.date));
          feed.innerHTML = sorted.map(renderCard).join('');
        },
        error() {
          document.getElementById('feed').innerHTML =
            '<div class="empty-state">Failed to load signals. Check sheet permissions.</div>';
        },
      });
    }

    function renderStubPage(path, label) {
      document.getElementById('page').innerHTML = `
        <div class="stub-page">
          <span class="stub-path">&gt; /${path}</span>
          <span>— ${label} coming soon —</span>
        </div>`;
    }

    function renderDashboard() { renderStubPage('dashboard', 'Dashboard'); }
    function renderWatchlist() { renderStubPage('stocks',    'Watchlist'); }
    function parseGainLoss(val) {
      if (val == null || val === '') return null;
      const str = String(val).trim();
      const n = parseFloat(str);
      if (isNaN(n)) return null;
      return str.endsWith('%') ? n : n * 100;
    }

    function formatCurrentPrice(val) {
      const n = parseFloat(val);
      return isNaN(n) ? '—' : `$${n.toFixed(2)}`;
    }

    function formatCostBasis(val) {
      const n = parseFloat(val);
      return isNaN(n) ? escapeHtml(val || '') : `$${n.toFixed(2)}`;
    }

    function formatGainLossCell(val) {
      const n = parseGainLoss(val);
      if (n == null) return '<span class="holdings-gain-empty">—</span>';
      const pct = n.toFixed(1);
      const sign = n > 0 ? '+' : '';
      const cls =
        n > 0 ? 'holdings-gain-pos' :
        n < 0 ? 'holdings-gain-neg' :
                'holdings-gain-zero';
      return `<span class="${cls}">${sign}${pct}%</span>`;
    }

    function sortHoldings(rows) {
      const dir = holdingsSortDir === 'asc' ? 1 : -1;
      return rows.slice().sort((a, b) => {
        if (holdingsSortKey === 'ticker') {
          return a.ticker.localeCompare(b.ticker) * dir;
        }
        if (holdingsSortKey === 'current_price') {
          const av = parseFloat(a.current_price);
          const bv = parseFloat(b.current_price);
          if (isNaN(av) && isNaN(bv)) return 0;
          if (isNaN(av)) return 1;
          if (isNaN(bv)) return -1;
          return (av - bv) * dir;
        }
        // gain_loss_pct / day_gain_loss_pct: blanks/non-numeric always last regardless of direction
        const av = parseGainLoss(a[holdingsSortKey]);
        const bv = parseGainLoss(b[holdingsSortKey]);
        if (av == null && bv == null) return 0;
        if (av == null) return 1;
        if (bv == null) return -1;
        return (av - bv) * dir;
      });
    }

    function renderHoldings() {
      document.getElementById('page').innerHTML = `
        <div class="holdings-page">
          <div class="holdings-header">
            <h1 class="feed-title">Holdings</h1>
            <input class="form-input holdings-search" id="holdings-search" type="text" placeholder="search ticker…" autocomplete="off" />
            <span class="feed-count holdings-count" id="holdings-count">— POSITIONS</span>
          </div>
          <div id="holdings-body">${[1,2,3,4].map(() => '<div class="skeleton" style="margin-bottom:8px;"></div>').join('')}</div>
        </div>`;

      document.getElementById('holdings-search').addEventListener('input', (e) => {
        holdingsFilter = e.target.value.trim().toLowerCase();
        renderHoldingsTable();
      });

      holdingsRows    = [];
      holdingsSortKey = 'ticker';
      holdingsSortDir = 'asc';
      holdingsFilter  = '';
      Papa.parse(HOLDINGS_CSV_URL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete(results) {
          holdingsRows = results.data.filter(r => r.ticker);
          renderHoldingsTable();
        },
        error() {
          document.getElementById('holdings-body').innerHTML =
            '<div class="empty-state">Failed to load holdings. Check sheet permissions.</div>';
        },
      });
    }

    function renderHoldingsTable() {
      const body = document.getElementById('holdings-body');
      const count = document.getElementById('holdings-count');
      const total = holdingsRows.length;

      if (total === 0) {
        body.innerHTML = '<div class="empty-state">No holdings recorded.</div>';
        count.textContent = '0 POSITIONS';
        return;
      }

      const filtered = holdingsFilter
        ? holdingsRows.filter(r => r.ticker.toLowerCase().includes(holdingsFilter))
        : holdingsRows;

      count.textContent = holdingsFilter
        ? `${filtered.length} OF ${total} POSITIONS`
        : `${total} POSITIONS`;

      if (filtered.length === 0) {
        body.innerHTML = '<div class="empty-state">No matching tickers.</div>';
        return;
      }

      const sorted = sortHoldings(filtered);

      const arrow = (key) =>
        holdingsSortKey === key ? (holdingsSortDir === 'asc' ? ' ▲' : ' ▼') : '';
      const activeCls = (key) => holdingsSortKey === key ? ' active' : '';

      body.innerHTML = `
        <table class="holdings-table">
          <thead>
            <tr>
              <th class="sortable${activeCls('ticker')}" data-sort="ticker">TICKER${arrow('ticker')}</th>
              <th class="sortable${activeCls('current_price')}" data-sort="current_price">CURRENT PRICE${arrow('current_price')}</th>
              <th>COST BASIS</th>
              <th class="sortable${activeCls('gain_loss_pct')}" data-sort="gain_loss_pct">GAIN/LOSS${arrow('gain_loss_pct')}</th>
              <th class="sortable${activeCls('day_gain_loss_pct')}" data-sort="day_gain_loss_pct">DAY GAIN/LOSS${arrow('day_gain_loss_pct')}</th>
            </tr>
          </thead>
          <tbody>
            ${sorted.map(r => `
              <tr>
                <td class="holdings-ticker">${escapeHtml(r.ticker)}</td>
                <td class="holdings-price">${formatCurrentPrice(r.current_price)}</td>
                <td class="holdings-cost">${formatCostBasis(r.cost_basis)}</td>
                <td>${formatGainLossCell(r.gain_loss_pct)}</td>
                <td>${formatGainLossCell(r.day_gain_loss_pct)}</td>
              </tr>`).join('')}
          </tbody>
        </table>`;

      body.querySelectorAll('th.sortable').forEach(th => {
        th.addEventListener('click', () => {
          const key = th.dataset.sort;
          if (holdingsSortKey === key) {
            holdingsSortDir = holdingsSortDir === 'asc' ? 'desc' : 'asc';
          } else {
            holdingsSortKey = key;
            holdingsSortDir = (key === 'gain_loss_pct' || key === 'day_gain_loss_pct') ? 'desc' : 'asc';
          }
          renderHoldingsTable();
        });
      });
    }
    function renderSources()   { renderStubPage('sources',   'Sources');   }

    function renderNewSignal() {
      document.getElementById('page').innerHTML = `
        <div class="new-signal-page">
          <h1>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
            </svg>
            Inject New Signal
          </h1>
          <div class="form-card">
            <form id="new-signal-form">
              <div class="form-row cols-2">
                <div class="form-field">
                  <label class="form-label">ASSET TICKER</label>
                  <input class="form-input" name="ticker" type="text" placeholder="e.g. NVDA" required />
                </div>
                <div class="form-field">
                  <label class="form-label">AUTHOR</label>
                  <input class="form-input" name="author" type="text" placeholder="e.g. unusual_whales" required />
                </div>
              </div>
              <div class="form-row cols-2">
                <div class="form-field">
                  <label class="form-label">PLATFORM</label>
                  <input class="form-input" name="source" type="text" placeholder="e.g. X or TheStreet" required />
                </div>
                <div class="form-field">
                  <label class="form-label">SENTIMENT</label>
                  <select class="form-select" name="sentiment" required>
                    <option value="bullish">BULLISH</option>
                    <option value="bearish">BEARISH</option>
                    <option value="neutral">NEUTRAL</option>
                  </select>
                </div>
              </div>
              <div class="form-row">
                <div class="form-field">
                  <label class="form-label">SIGNAL CONTENT</label>
                  <textarea class="form-textarea" name="thesis" placeholder="> Enter signal content..." required></textarea>
                </div>
              </div>
              <div class="form-row cols-2">
                <div class="form-field">
                  <label class="form-label">SOURCE URL (OPTIONAL)</label>
                  <input class="form-input" name="source_url" type="url" placeholder="https://" />
                </div>
                <div class="form-field">
                  <label class="form-label">POST TIMESTAMP</label>
                  <input class="form-input" name="date" type="datetime-local" required />
                </div>
              </div>
              <div class="form-row cols-3">
                <div class="form-field">
                  <label class="form-label">ENTRY ($)</label>
                  <input class="form-input" name="entry" type="number" step="0.01" placeholder="Optional" />
                </div>
                <div class="form-field">
                  <label class="form-label">STOP ($)</label>
                  <input class="form-input stop-field" name="stop_loss" type="number" step="0.01" placeholder="Optional" />
                </div>
                <div class="form-field">
                  <label class="form-label">TARGET ($)</label>
                  <input class="form-input" name="target" type="number" step="0.01" placeholder="Optional" />
                </div>
              </div>
              <div class="form-actions">
                <button type="button" class="btn btn-outline" id="abort-btn">ABORT</button>
                <button type="submit" class="btn btn-primary" id="submit-btn">COMMIT SIGNAL</button>
              </div>
            </form>
          </div>
        </div>`;

      document.getElementById('abort-btn').addEventListener('click', () => navigate('#/signals'));
      document.getElementById('new-signal-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = 'INJECTING...';
        const data = Object.fromEntries(new FormData(e.target).entries());
        await submitSignal(data);
        btn.disabled = false;
        btn.textContent = 'COMMIT SIGNAL';
      });
    }

    /* ── WRITE STUB (auth deferred — write UI is hidden) ── */
    async function submitSignal(data) {
      // Stub: log to console until Sheets write auth is implemented.
      // When ready: POST to Sheets REST API appending row in column order:
      // date, author, source, source_url, ticker, entry, target, stop_loss, sentiment, thesis
      // raw_text column left blank for manual entries.
      console.log('submitSignal (stub):', data);
      alert('Write functionality is not yet enabled.');
    }

    /* ── ROUTER ── */
    const ROUTES = {
      '#/':            { render: renderDashboard, path: '/dashboard',   },
      '#/stocks':      { render: renderWatchlist, path: '/stocks',      },
      '#/holdings':    { render: renderHoldings,  path: '/holdings',    },
      '#/signals':     { render: renderSignals,   path: '/signals',     },
      '#/sources':     { render: renderSources,   path: '/sources',     },
      '#/signals/new': { render: renderNewSignal, path: '/signals/new', },
    };

    function navigate(hash) {
      window.location.hash = hash;
    }

    function activeNavHash(hash) {
      return hash.startsWith('#/signals/') ? '#/signals' : hash;
    }

    function updateNav(hash) {
      const active = activeNavHash(hash);
      const navHtml = NAV_ITEMS.map(item => `
        <a class="nav-item${item.hash === active ? ' active' : ''}" href="${item.hash}">
          ${item.icon}${item.label}
        </a>`).join('');
      const drawerHtml = NAV_ITEMS.map(item => `
        <a class="nav-item${item.hash === active ? ' active' : ''}" href="${item.hash}" onclick="closeDrawer()">
          ${item.icon}${item.label}
        </a>`).join('');
      const bottomHtml = NAV_ITEMS.map(item => `
        <a class="bottom-nav-item${item.hash === active ? ' active' : ''}" href="${item.hash}">
          ${item.icon}${item.mobileLabel}
        </a>`).join('');

      document.getElementById('sidebar-nav').innerHTML = navHtml;
      document.getElementById('drawer-nav').innerHTML = drawerHtml;
      document.getElementById('bottom-nav').innerHTML = bottomHtml;

      const route = ROUTES[hash] || ROUTES['#/signals'];
      document.getElementById('header-path').textContent = `> ${route.path}`;
    }

    function handleRoute() {
      const hash = window.location.hash || '#/signals';
      const route = ROUTES[hash] || ROUTES['#/signals'];
      updateNav(hash);
      route.render();
    }

    /* ── MOBILE DRAWER ── */
    function openDrawer() {
      document.getElementById('drawer-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeDrawer() {
      document.getElementById('drawer-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    /* ── INIT ── */
    document.getElementById('hamburger-btn').addEventListener('click', openDrawer);
    document.getElementById('drawer-close').addEventListener('click', closeDrawer);
    document.getElementById('drawer-backdrop').addEventListener('click', closeDrawer);

    window.addEventListener('hashchange', handleRoute);
    window.addEventListener('DOMContentLoaded', () => {
      if (!window.location.hash) window.location.hash = '#/signals';
      handleRoute();
    });
  </script>
</body>
</html>
