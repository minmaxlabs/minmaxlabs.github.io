<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MinMaxTrader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="icon.png" />
  <script id="gsi-script" src="https://accounts.google.com/gsi/client" async></script>
  <style>
    :root {
      --bg:           hsl(230, 25%,  6%);
      --card:         hsl(230, 25%,  8%);
      --border:       hsl(230, 25%, 14%);
      --secondary:    hsl(230, 25%, 14%);
      --fg:           hsl(210, 40%, 98%);
      --fg-muted:     hsl(215, 20%, 55%);
      --primary:      hsl(180, 100%, 50%);
      --primary-10:   hsla(180, 100%, 50%, 0.10);
      --primary-20:   hsla(180, 100%, 50%, 0.20);
      --primary-30:   hsla(180, 100%, 50%, 0.30);
      --accent:       hsl(280, 100%, 65%);
      --red:          hsl(0, 84%, 60%);
      --red-10:       hsla(0, 84%, 60%, 0.10);
      --red-30:       hsla(0, 84%, 60%, 0.30);
      --border-half:  hsla(230, 25%, 40%, 0.25);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
    }

    /* ── Sidebar ── */
    .sidebar {
      display: none;
      width: 224px;
      flex-shrink: 0;
      flex-direction: column;
      background: var(--card);
      border-right: 1px solid var(--border);
    }
    @media (min-width: 768px) { .sidebar { display: flex; } }

    .sidebar-logo {
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }
    .sidebar-logo svg { color: var(--primary); flex-shrink: 0; }
    .logo-text { font-weight: 700; font-size: 15px; letter-spacing: 0.12em; color: var(--primary); }
    .logo-text span { color: var(--fg); }

    .sidebar-nav { flex: 1; padding: 16px 8px; display: flex; flex-direction: column; gap: 2px; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      color: var(--fg-muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-decoration: none;
      user-select: none;
    }
    .nav-item:hover { background: var(--secondary); color: var(--fg); }
    .nav-item.active {
      background: var(--primary-10);
      color: var(--primary);
      border: 1px solid var(--primary-30);
    }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }

    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--fg-muted);
    }
    .sidebar-footer-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .status-dot { display: inline-flex; align-items: center; color: var(--primary); gap: 6px; }
    .pulse {
      width: 8px; height: 8px; border-radius: 50%; background: var(--primary);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; min-height: 100vh; overflow: hidden; }

    .header {
      height: 56px;
      border-bottom: 1px solid var(--border);
      background: hsla(230, 25%, 8%, 0.5);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-path {
      display: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--fg-muted);
    }
    @media (min-width: 768px) { .header-path { display: block; } }

    .mobile-logo { display: flex; align-items: center; gap: 6px; }
    .mobile-logo svg { color: var(--primary); }
    .mobile-logo-text { font-weight: 700; font-size: 14px; letter-spacing: 0.12em; color: var(--primary); }
    .mobile-logo-text span { color: var(--fg); }
    @media (min-width: 768px) { .mobile-logo { display: none; } }

    .hamburger-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      color: var(--fg-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .hamburger-btn:hover { color: var(--fg); }
    @media (min-width: 768px) { .hamburger-btn { display: none; } }

    /* NEW SIGNAL button — hidden until write is enabled */
    .new-signal-btn { display: none; }

    /* ── Content ── */
    .content { flex: 1; overflow: auto; padding: 16px; padding-bottom: 80px; }
    @media (min-width: 768px) { .content { padding: 24px; padding-bottom: 24px; } }

    /* ── Mobile bottom nav ── */
    .bottom-nav {
      display: flex;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 64px;
      background: var(--card);
      border-top: 1px solid var(--border);
      z-index: 40;
    }
    @media (min-width: 768px) { .bottom-nav { display: none; } }

    .bottom-nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--fg-muted);
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
      transition: color 0.15s;
    }
    .bottom-nav-item.active { color: var(--primary); }
    .bottom-nav-item svg { width: 20px; height: 20px; }

    /* ── Mobile drawer overlay ── */
    .drawer-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
    }
    .drawer-overlay.open { display: flex; }

    .drawer-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
    }
    .drawer {
      position: relative;
      z-index: 1;
      width: 256px;
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    .drawer-header {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .drawer-close {
      background: none;
      border: none;
      color: var(--fg-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
    }
    .drawer-close:hover { color: var(--fg); }
    .drawer-nav { flex: 1; padding: 16px 8px; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }

    /* ── Signal cards ── */
    .feed-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
    .feed-title { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: 700; }
    .feed-count { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--fg-muted); }
    .signal-list { display: flex; flex-direction: column; gap: 16px; max-width: 896px; margin: 0 auto; }
    .card-feed { display: flex; flex-direction: column; gap: 5px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }
    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .card-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; min-width: 0; }
    .ticker { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 15px; color: var(--fg); }

    .badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 2px 8px;
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }
    .badge-bull { color: var(--primary); border: 1px solid var(--primary-30); background: var(--primary-10); }
    .badge-bear { color: var(--red);     border: 1px solid var(--red-30);     background: var(--red-10); }
    .badge-neu  { color: var(--fg-muted); border: 1px solid var(--border);    background: var(--secondary); }

    .card-date { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--fg-muted); white-space: nowrap; flex-shrink: 0; }

    .card-source { display: flex; align-items: center; gap: 4px; margin-bottom: 8px; }
    .source-author { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); }
    .source-platform { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--fg-muted); text-transform: uppercase; }

    .card-thesis {
      font-size: 14px;
      color: hsla(210, 40%, 98%, 0.80);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-thesis.expanded {
      display: block;
      -webkit-line-clamp: unset;
      overflow: visible;
    }
    .card-thesis-toggle {
      background: none;
      border: none;
      padding: 0;
      margin-top: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .card-thesis-toggle:hover { text-decoration: underline; }
    .card-thesis-toggle[hidden] { display: none; }
    .card-levels {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border-half);
    }
    .level-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--fg-muted); }
    .level-value { font-weight: 700; }
    .level-price  .level-value { color: var(--fg); }
    .level-entry  .level-value { color: var(--fg); }
    .level-stop   .level-value { color: var(--red); }
    .level-target .level-value { color: var(--primary); }
    .level-upside-pos .level-value { color: var(--primary); }
    .level-upside-neg .level-value { color: var(--red); }
    .level-risk   .level-value { color: var(--red); }
    .level-risk-pct  { font-size: 12px; font-weight: 700; color: var(--red); }
    .level-upside-pct-pos { font-size: 12px; font-weight: 700; color: var(--primary); }
    .level-upside-pct-neg { font-size: 12px; font-weight: 700; color: var(--red); }

    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      text-decoration: none;
    }
    .card-link:hover { text-decoration: underline; }
    .card-link svg { width: 12px; height: 12px; }

    /* ── Skeletons ── */
    .skeleton {
      background: var(--secondary);
      border-radius: 8px;
      height: 96px;
      animation: shimmer 1.5s ease-in-out infinite;
    }
    @keyframes shimmer { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

    /* ── Empty / error / stub states ── */
    .empty-state {
      text-align: center;
      padding: 48px 16px;
      color: var(--fg-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .stub-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 16px;
      color: var(--fg-muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      gap: 8px;
    }
    .stub-page .stub-path { color: var(--primary); font-size: 16px; }

    /* ── New signal form ── */
    .new-signal-page { max-width: 560px; margin: 0 auto; }
    .new-signal-page h1 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .new-signal-page h1 svg { color: var(--primary); width: 18px; height: 18px; }
    .form-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
    .form-row { display: grid; gap: 16px; margin-bottom: 16px; }
    .form-row.cols-2 { grid-template-columns: 1fr 1fr; }
    .form-row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .form-field { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--fg-muted); letter-spacing: 0.06em; }
    .form-input, .form-select, .form-textarea {
      background: var(--secondary);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--fg);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      padding: 8px 10px;
      transition: border-color 0.15s;
      width: 100%;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--primary-30);
    }
    .form-textarea { resize: none; min-height: 90px; }
    .form-input.stop-field { border-color: var(--red-30); }
    .form-actions { display: flex; gap: 12px; margin-top: 8px; }
    .btn {
      flex: 1;
      padding: 10px;
      border-radius: 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn-outline { background: transparent; color: var(--fg); border: 1px solid var(--border); }
    .btn-outline:hover { background: var(--secondary); }
    .btn-primary { background: var(--primary-10); border: 1px solid var(--primary-30); color: var(--primary); }
    .btn-primary:hover { background: var(--primary-20); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    @media (max-width: 480px) {
      .form-row.cols-2, .form-row.cols-3 { grid-template-columns: 1fr; }
    }

    /* ── Holdings ── */
    .holdings-page { max-width: 896px; margin: 0 auto; }

    .holdings-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .holdings-header .feed-title { flex-shrink: 0; }
    .holdings-count { flex-shrink: 0; }
    .holdings-search {
      flex: 1;
      min-width: 0;
      max-width: 240px;
    }
    .filter-pills { display: flex; flex-shrink: 0; border: 1px solid var(--border); border-radius: 5px; overflow: hidden; }
    .filter-pill {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 8px 12px;
      border: none;
      border-right: 1px solid var(--border);
      background: var(--secondary);
      color: var(--fg-muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .filter-pill:last-child { border-right: none; }
    .filter-pill:hover { background: var(--card); color: var(--fg); }
    .filter-pill.active { background: var(--primary-10); color: var(--primary); }

    .holdings-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .holdings-table th,
    .holdings-table td {
      padding: 6px 12px;
      text-align: left;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }
    .holdings-table thead th {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--fg-muted);
      border-bottom: 1px solid var(--border);
      user-select: none;
      white-space: nowrap;
    }
    .holdings-table th.sortable {
      cursor: pointer;
      transition: color 0.15s;
    }
    .holdings-table th.sortable:hover { color: var(--fg); }
    .holdings-table th.sortable.active { color: var(--primary); }
    .holdings-table tbody tr { border-top: 1px solid var(--border-half); }
    .holdings-table tbody tr:first-child { border-top: none; }

    .holdings-ticker     { color: var(--fg); font-weight: 700; }
    .holdings-price      { color: var(--fg); }
    .holdings-cost       { color: var(--fg); }
    .holdings-gain-pos   { color: var(--primary); font-weight: 700; }
    .holdings-gain-neg   { color: var(--red);     font-weight: 700; }
    .holdings-gain-zero  { color: var(--fg); }
    .holdings-gain-empty { color: var(--fg-muted); }

    @media (max-width: 480px) {
      .holdings-header { flex-direction: column; align-items: stretch; }
      .holdings-search { max-width: none; }
      .holdings-count  { text-align: right; }
      .holdings-table th, .holdings-table td { padding: 5px 10px; }
    }

    /* ── Dashboard ── */
    .dashboard-page { max-width: 896px; margin: 0 auto; }
    .dash-section-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--fg-muted);
      margin-bottom: 10px;
    }
    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    @media (max-width: 600px) { .stat-grid { grid-template-columns: 1fr; } }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
    }
    .stat-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--fg-muted);
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }
    .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      font-weight: 700;
      color: var(--fg);
    }
    .stat-value.positive { color: var(--primary); }
    .stat-value.negative { color: var(--red); }
    .stat-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--fg-muted);
      margin-top: 6px;
    }
    .movers-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 480px) { .movers-grid { grid-template-columns: 1fr; } }
    .movers-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .movers-card-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    .movers-card-title.gainers { color: var(--primary); }
    .movers-card-title.losers  { color: var(--red); }
    .mover-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-half);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
    }
    .mover-row:last-child { border-bottom: none; }
    .mover-ticker { font-weight: 700; color: var(--fg); }
    .mover-pct-pos { font-weight: 700; color: var(--primary); }
    .mover-pct-neg { font-weight: 700; color: var(--red); }

    /* ── Ticker links ── */
    .ticker-link { color: inherit; text-decoration: none; cursor: pointer; }
    .ticker-link:hover { opacity: 0.75; }

    /* ── Stock detail page ── */
    .stock-page { max-width: 896px; margin: 0 auto; }
    .stock-page-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .stock-back-btn {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      color: var(--fg-muted); font-family: 'JetBrains Mono', monospace; font-size: 11px;
      padding: 6px 12px; cursor: pointer; display: flex; align-items: center; gap: 6px;
    }
    .stock-back-btn:hover { color: var(--fg); border-color: var(--fg-muted); }
    .stock-ticker-heading { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; color: var(--primary); }
    .stock-chart-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      overflow: hidden; margin-bottom: 28px;
    }
    .stock-chart-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 10px 14px; border-bottom: 1px solid var(--border-half);
      flex-wrap: wrap;
    }
    .stock-quote {
      display: flex; align-items: baseline; gap: 10px;
      font-family: 'JetBrains Mono', monospace;
    }
    .stock-quote-price { font-size: 18px; font-weight: 700; color: var(--fg); }
    .stock-quote-change { font-size: 13px; font-weight: 600; }
    .stock-quote-change.pos { color: var(--primary); }
    .stock-quote-change.neg { color: var(--red); }
    .stock-quote-muted { font-size: 11px; color: var(--fg-muted); }
    .tf-group { display: flex; gap: 4px; }
    .tf-btn {
      background: none; border: 1px solid var(--border); border-radius: 4px;
      color: var(--fg-muted); font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
      padding: 4px 10px; cursor: pointer; transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .tf-btn:hover:not(:disabled) { color: var(--fg); border-color: var(--fg-muted); }
    .tf-btn.active {
      color: var(--primary); border-color: var(--primary-30); background: var(--primary-10);
    }
    .stock-chart-container {
      position: relative; height: 720px; width: 100%;
    }
    .stock-chart-status {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--fg-muted);
      text-align: center; padding: 16px; pointer-events: none;
    }
    .stock-chart-status.error { color: var(--red); }
    .pane-legend {
      position: absolute; top: 4px; left: 8px; z-index: 3;
      display: flex; flex-wrap: wrap; gap: 2px 10px;
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      letter-spacing: 0.06em; color: var(--fg-muted);
      pointer-events: none;
    }
    .pane-legend .legend-item { display: inline-flex; align-items: center; gap: 5px; }
    .pane-legend .legend-swatch {
      display: inline-block; width: 12px; height: 2px; border-radius: 1px;
    }
    .stock-signals-header {
      font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; color: var(--fg-muted); margin-bottom: 12px;
    }

    /* ── Login screen ── */
    .login-screen {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .login-screen.hidden { display: none; }
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 40px 32px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .login-logo { color: var(--primary); margin-bottom: 16px; }
    .login-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--primary);
      margin-bottom: 6px;
    }
    .login-subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--fg-muted);
      text-align: center;
      margin-bottom: 28px;
    }
    .login-divider { width: 100%; height: 1px; background: var(--border); margin-bottom: 28px; }
    .login-error {
      display: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--red);
      text-align: center;
      padding: 8px 12px;
      background: var(--red-10);
      border: 1px solid var(--red-30);
      border-radius: 4px;
      width: 100%;
      margin-top: 16px;
    }
    .login-error.visible { display: block; }

    /* ── Logout button ── */
    .logout-btn {
      background: none;
      border: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--fg-muted);
      cursor: pointer;
      padding: 0;
      transition: color 0.15s;
    }
    .logout-btn:hover { color: var(--red); }
  </style>
</head>
<body>

  <!-- Mobile drawer overlay -->
  <div class="drawer-overlay" id="drawer-overlay">

  <!-- Main -->
  <main class="main">
    <header class="header">
      <div class="header-left">
        <button class="hamburger-btn" id="hamburger-btn" aria-label="Open menu">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>

      <!-- NEW SIGNAL button: display:none until write is enabled -->

          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>

      </button>

    <div class="content">
      <div id="page"></div>

    <nav class="bottom-nav" id="bottom-nav"></nav>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://unpkg.com/lightweight-charts@5.0.7/dist/lightweight-charts.standalone.production.js"></script>
  <script>
    /* ── AUTH CONFIG ── */
    // Create a Client ID at: https://console.cloud.google.com/apis/credentials
    // Add your GitHub Pages origin to "Authorized JavaScript origins".
    const GOOGLE_CLIENT_ID = '21043724365-9r9ma8rbb3pgssn6i0c77cljl1tb021o.apps.googleusercontent.com';
    let currentUser = null;

    function decodeJwt(token) {
      const b64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
      return JSON.parse(atob(b64));
    }

    function showLoginScreen() {
      document.getElementById('login-screen').classList.remove('hidden');
    }

    function hideLoginScreen() {
      document.getElementById('login-screen').classList.add('hidden');
    }

    function onGoogleSignIn(response) {
      const payload = decodeJwt(response.credential);
      currentUser = { email: payload.email, name: payload.name, picture: payload.picture };
      sessionStorage.setItem('mmt_user', JSON.stringify(currentUser));
      hideLoginScreen();
      updateSidebarUser();
      window.location.hash = '#/';
      handleRoute();
    }

    function setupGoogleSignIn() {
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: onGoogleSignIn,
        auto_select: true,
      });
      google.accounts.id.renderButton(
        document.getElementById('google-signin-btn'),
        { theme: 'filled_black', size: 'large', width: 280 }
      );
      google.accounts.id.prompt();
    }

    function initAuth() {
      const stored = sessionStorage.getItem('mmt_user');
      if (stored) {
        try {
          currentUser = JSON.parse(stored);
          hideLoginScreen();
          updateSidebarUser();
          handleRoute();
          return;
        } catch {
          sessionStorage.removeItem('mmt_user');
        }
      }
      showLoginScreen();
      const gsiScript = document.getElementById('gsi-script');
      if (typeof google !== 'undefined') {
        setupGoogleSignIn();
      } else {
        gsiScript.addEventListener('load', setupGoogleSignIn);
      }
    }

    function signOut() {
      sessionStorage.removeItem('mmt_user');
      currentUser = null;
      if (typeof google !== 'undefined') google.accounts.id.disableAutoSelect();
      updateSidebarUser();
      document.getElementById('google-signin-btn').innerHTML = '';
      showLoginScreen();
      if (typeof google !== 'undefined') setupGoogleSignIn();
    }

    function updateSidebarUser() {
      const el = document.getElementById('sidebar-user');
      if (el) el.textContent = currentUser ? currentUser.email : '';
    }

    /* ── CONFIG ── */
    const SHEET_ID = '1UfNnkX3zyhCJ42igJ98gN3i1sx_cEkwNyB9qxFXz4m0';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;
    const HOLDINGS_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Holdings`;
    const TRANSACTIONS_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Transactions`;

    // Polygon supplies daily OHLCV for the chart; Finnhub supplies the realtime quote header.
    // Domain-restrict these keys in each provider's dashboard before deploying.
    const POLYGON_API_KEY = 'XUx2WtfT6M7rXpTKjmKFFIKmn4NPHG1b';
    const FINNHUB_API_KEY = 'd8qalf1r01qr03ngkgdgd8qalf1r01qr03ngkge0';

    let holdingsRows = [];
    let holdingsSortKey = 'ticker';
    let holdingsSortDir = 'asc';
    let holdingsFilter = '';

    let transactionsRows = [];
    let transactionsSortKey = 'date';
    let transactionsSortDir = 'desc';
    let transactionsFilter = '';

    let signalRows = [];
    let signalFilter = '';
    let signalSentimentFilter = 'all';

    /* ── NAV ITEMS ── */
    const NAV_ITEMS = [
      {
        hash: '#/',
        label: 'Dashboard',
        mobileLabel: 'Home',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>',
      },
      {
        hash: '#/signals',
        label: 'Signals',
        mobileLabel: 'Signals',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>',
      },
      {
        hash: '#/stocks',
        label: 'Watchlist',
        mobileLabel: 'Watch',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a10 10 0 0 1 10 10"/><path d="M12 2a10 10 0 0 0-10 10"/><path d="M12 22a10 10 0 0 0 10-10"/><path d="M12 22a10 10 0 0 1-10-10"/></svg>',
      },
      {
        hash: '#/holdings',
        label: 'Holdings',
        mobileLabel: 'Hold',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>',
      },
      {
        hash: '#/transactions',
        label: 'Transactions',
        mobileLabel: 'Txns',
        icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>',
      },
    ];

    /* ── HELPERS ── */
    function escapeHtml(str) {
      return (str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatDate(val) {
      if (!val) return '';
      try {
        return new Date(val).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      } catch { return val; }
    }

    function formatPrice(val) {
      const n = parseFloat(val);
      return isNaN(n) ? null : n;
    }

    function sentimentBadge(sentiment) {
      const s = (sentiment || '').toLowerCase();
      if (s === 'bullish') return `<span class="badge badge-bull"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>BULL</span>`;
      if (s === 'bearish') return `<span class="badge badge-bear"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>BEAR</span>`;
      return `<span class="badge badge-neu"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/></svg>NEU</span>`;
    }

    function renderLevels(row) {
      const price = formatPrice(row.current_price);
      const e = formatPrice(row.entry);
      const t = formatPrice(row.target);
      const s = formatPrice(row.stop_loss);
      const u = formatPrice(row.upside);
      const r = formatPrice(row.risk);
      if (price == null && e == null && t == null && s == null && !row.source_url) return '';
      let html = '<div class="card-levels">';
      if (price != null) html += `<span class="level-label level-price">PRICE: <span class="level-value">$${price.toFixed(2)}</span></span>`;
      if (e != null) html += `<span class="level-label level-entry">ENTRY: <span class="level-value">$${e.toFixed(2)}</span></span>`;
      if (s != null) {
        const rSuffix = r != null ? ` <span class="level-risk-pct">(-${(r * 100).toFixed(1)}%)</span>` : '';
        html += `<span class="level-label level-stop">STOP: <span class="level-value">$${s.toFixed(2)}</span>${rSuffix}</span>`;
      }
      if (t != null) {
        const uSuffix = u != null ? ` <span class="${u >= 0 ? 'level-upside-pct-pos' : 'level-upside-pct-neg'}">(${u >= 0 ? '+' : ''}${(u * 100).toFixed(1)}%)</span>` : '';
        html += `<span class="level-label level-target">TARGET: <span class="level-value">$${t.toFixed(2)}</span>${uSuffix}</span>`;
      }
      if (row.source_url) html += `<a class="card-link" href="${escapeHtml(row.source_url)}" target="_blank" rel="noreferrer" style="margin-left:auto;margin-top:0"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>SOURCE</a>`;
      return html + '</div>';
    }

    function renderCard(row) {
      const { date, author, source, source_url, ticker, sentiment, thesis } = row;
      return `
        <div class="card">
          <div class="card-top">
            <div class="card-left">
              <a class="ticker ticker-link" href="#/stock/${encodeURIComponent(ticker)}">${escapeHtml(ticker)}</a>
              ${sentimentBadge(sentiment)}
              <a class="source-author ticker-link" href="#/author/${encodeURIComponent(author)}">@${escapeHtml(author)}</a>
            </div>
            <span class="card-date">${formatDate(date)}</span>
          </div>
          <p class="card-thesis">${escapeHtml(thesis)}</p>
          <button type="button" class="card-thesis-toggle" hidden>show more</button>
          ${renderLevels(row)}
        </div>`;
    }

    function applyThesisToggles(root) {
      const scope = root || document;
      scope.querySelectorAll('.card').forEach(card => {
        const p   = card.querySelector('.card-thesis');
        const btn = card.querySelector('.card-thesis-toggle');
        if (!p || !btn) return;
        const wasExpanded = p.classList.contains('expanded');
        if (wasExpanded) p.classList.remove('expanded');
        const overflowing = p.scrollHeight > p.clientHeight + 1;
        if (wasExpanded && overflowing) p.classList.add('expanded');
        btn.hidden = !overflowing;
        btn.textContent = p.classList.contains('expanded') ? 'show less' : 'show more';
      });
    }

    document.addEventListener('click', (e) => {
      const btn = e.target.closest('.card-thesis-toggle');
      if (!btn) return;
      const p = btn.parentElement && btn.parentElement.querySelector('.card-thesis');
      if (!p) return;
      const expanded = p.classList.toggle('expanded');
      btn.textContent = expanded ? 'show less' : 'show more';
    });

    let thesisResizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(thesisResizeTimer);
      thesisResizeTimer = setTimeout(() => applyThesisToggles(), 150);
    });

    /* ── CSV HELPER ── */
    function fetchCsv(url) {
      return new Promise((resolve, reject) => {
        Papa.parse(url, {
          download: true,
          header: true,
          skipEmptyLines: true,
          complete: r => resolve(r.data),
          error: reject,
        });
      });
    }

    /* ── PAGE RENDERERS ── */
    function renderSignals() {
      document.getElementById('page').innerHTML = `
        <div class="signal-list">
          <div class="feed-header">
            <h1 class="feed-title">Signal Feed</h1>
            <input class="form-input holdings-search" id="signal-search" type="text" placeholder="search ticker…" autocomplete="off" />
            <div class="filter-pills">
              <button class="filter-pill active" data-sentiment="all">ALL</button>
              <button class="filter-pill" data-sentiment="bullish">BULL</button>
              <button class="filter-pill" data-sentiment="bearish">BEAR</button>
            </div>
            <span class="feed-count" id="signal-count">— SIGNALS</span>
          </div>
          <div id="feed" class="card-feed">${[1,2,3,4].map(() => '<div class="skeleton" style="margin-bottom:8px;"></div>').join('')}</div>
        </div>`;

      document.getElementById('signal-search').addEventListener('input', (e) => {
        signalFilter = e.target.value.trim().toLowerCase();
        renderSignalFeed();
      });

      document.querySelectorAll('.filter-pill[data-sentiment]').forEach(pill => {
        pill.addEventListener('click', () => {
          signalSentimentFilter = pill.dataset.sentiment;
          document.querySelectorAll('.filter-pill[data-sentiment]').forEach(p =>
            p.classList.toggle('active', p.dataset.sentiment === signalSentimentFilter));
          renderSignalFeed();
        });
      });

      signalRows            = [];
      signalFilter          = '';
      signalSentimentFilter = 'all';

      Papa.parse(CSV_URL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete(results) {
          signalRows = results.data.filter(r => r.ticker)
            .sort((a, b) => new Date(b.date) - new Date(a.date));
          renderSignalFeed();
        },
        error() {
          document.getElementById('feed').innerHTML =
            '<div class="empty-state">Failed to load signals. Check sheet permissions.</div>';
        },
      });
    }

    function renderSignalFeed() {
      const feed  = document.getElementById('feed');
      const count = document.getElementById('signal-count');
      if (!feed || !count) return;

      const total = signalRows.length;
      if (total === 0) {
        feed.innerHTML = '<div class="empty-state">No signals recorded.</div>';
        count.textContent = '0 SIGNALS';
        return;
      }

      let filtered = signalFilter
        ? signalRows.filter(r => r.ticker.toLowerCase().includes(signalFilter))
        : signalRows;

      if (signalSentimentFilter !== 'all') {
        filtered = filtered.filter(r => (r.sentiment || '').toLowerCase() === signalSentimentFilter);
      }

      const anyFilter = signalFilter || signalSentimentFilter !== 'all';
      count.textContent = anyFilter ? `${filtered.length} OF ${total} SIGNALS` : `${total} SIGNALS`;

      feed.innerHTML = filtered.length
        ? filtered.map(renderCard).join('')
        : '<div class="empty-state">No matching signals.</div>';
      applyThesisToggles(feed);
    }

    function renderStubPage(path, label) {
      document.getElementById('page').innerHTML = `
        <div class="stub-page">
          <span class="stub-path">&gt; /${path}</span>
          <span>— ${label} coming soon —</span>
        </div>`;
    }

    function renderDashboard() {
      const skel = (n, h = 88) =>
        Array.from({length: n}, () => `<div class="skeleton" style="height:${h}px;"></div>`).join('');

      document.getElementById('page').innerHTML = `
        <div class="dashboard-page">
          <div class="feed-header">
            <h1 class="feed-title">Dashboard</h1>
          </div>

          <div class="dash-section-title">PORTFOLIO SNAPSHOT</div>
          <div id="dash-snapshot" class="stat-grid" style="margin-bottom:28px;">${skel(3)}</div>

          <div class="dash-section-title">TOP MOVERS TODAY</div>
          <div id="dash-movers" class="movers-grid" style="margin-bottom:28px;">
            <div class="skeleton" style="height:148px;"></div>
            <div class="skeleton" style="height:148px;"></div>
          </div>

          <div class="dash-section-title">RECENT SIGNALS</div>
          <div id="dash-signals" style="display:flex;flex-direction:column;gap:12px;margin-bottom:28px;">${skel(5)}</div>

          <div class="dash-section-title">RECENT TRANSACTIONS</div>
          <div id="dash-txns" style="margin-bottom:28px;">
            <div class="skeleton" style="height:148px;"></div>
          </div>
        </div>`;

      fetchCsv(HOLDINGS_CSV_URL).then(data => {
        const rows = data.filter(r => r.ticker);
        renderDashSnapshot(rows);
        renderDashMovers(rows);
      }).catch(() => {
        const snap = document.getElementById('dash-snapshot');
        const mov  = document.getElementById('dash-movers');
        if (snap) snap.innerHTML = '<div class="empty-state">Failed to load holdings.</div>';
        if (mov)  mov.innerHTML  = '';
      });

      fetchCsv(CSV_URL).then(data => {
        renderDashSignals(data.filter(r => r.ticker));
      }).catch(() => {
        const el = document.getElementById('dash-signals');
        if (el) el.innerHTML = '<div class="empty-state">Failed to load signals.</div>';

    // Roll a daily OHLCV series into weekly or monthly bars (W = ISO week, M = calendar month).
    // Each bar takes open/close from the first/last day, high=max, low=min, volume=sum.
    function aggregateCandles(candles, granularity) {
      if (granularity === 'D' || !candles.length) return candles;
      const bucketKey = granularity === 'W'
        ? (d) => {
            // ISO week — start of week Monday in UTC.
            const day = d.getUTCDay() || 7; // Sun=7
            const mon = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), d.getUTCDate() - (day - 1)));
            return mon.toISOString().slice(0, 10);
          }
        : (d) => `${d.getUTCFullYear()}-${String(d.getUTCMonth() + 1).padStart(2, '0')}`;

      const buckets = new Map();
      for (const c of candles) {
        const d = new Date(c.time * 1000);
        const k = bucketKey(d);
        const b = buckets.get(k);
        if (!b) {
          buckets.set(k, { time: c.time, open: c.open, high: c.high, low: c.low, close: c.close, volume: c.volume });
        } else {
          b.high = Math.max(b.high, c.high);
          b.low = Math.min(b.low, c.low);
          b.close = c.close;
          b.volume += c.volume;
        }
      }
      return Array.from(buckets.values()).sort((a, b) => a.time - b.time);
    }

    /* ── Chart: data fetch ── */
    async function fetchPolygonCandles(ticker) {
      const cached = candleCache.get(ticker);
      // Cache for 10 minutes to keep us well under Polygon's 5 req/min free-tier ceiling.
      if (cached && Date.now() - cached.fetchedAt < 10 * 60 * 1000) return cached.candles;

      const to = new Date();
      const from = new Date(to.getTime() - POLYGON_HISTORY_DAYS * 86400 * 1000);
      const fmt = d => d.toISOString().slice(0, 10);
      const url = `https://api.polygon.io/v2/aggs/ticker/${encodeURIComponent(ticker.toUpperCase())}` +
        `/range/1/day/${fmt(from)}/${fmt(to)}?adjusted=true&sort=asc&limit=5000&apiKey=${POLYGON_API_KEY}`;

      const resp = await fetch(url);
      if (!resp.ok) {
        const body = await resp.text().catch(() => '');
        throw new Error(`Polygon ${resp.status}: ${body.slice(0, 160) || resp.statusText}`);
      }
      const json = await resp.json();
      if (!json.results || !json.results.length) throw new Error('No candles returned');

      const candles = json.results.map(b => ({
        time: Math.floor(b.t / 1000), // UNIX seconds for Lightweight Charts
        open: b.o, high: b.h, low: b.l, close: b.c, volume: b.v,
      }));
      candleCache.set(ticker, { fetchedAt: Date.now(), candles });
      return candles;
    }

    async function fetchAndRenderQuote(ticker) {
      const el = document.getElementById('stock-quote');
      if (!el) return;
      try {
        const resp = await fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(ticker.toUpperCase())}&token=${FINNHUB_API_KEY}`);
        if (!resp.ok) throw new Error(`Finnhub ${resp.status}`);
        const q = await resp.json();
        if (typeof q.c !== 'number' || q.c === 0) throw new Error('No quote');
        const change = q.d, pct = q.dp;
        const sign = change >= 0 ? '+' : '';
        const cls = change >= 0 ? 'pos' : 'neg';
        el.innerHTML = `
          <span class="stock-quote-price">$${q.c.toFixed(2)}</span>
          <span class="stock-quote-change ${cls}">${sign}${change.toFixed(2)} (${sign}${pct.toFixed(2)}%)</span>
          <span class="stock-quote-muted">prev $${q.pc.toFixed(2)}</span>`;
      } catch {
        el.innerHTML = '<span class="stock-quote-muted">Quote unavailable</span>';
      }
    }

    /* ── Chart: indicators ── */
    function computeSMA(values, period) {
      const out = new Array(values.length).fill(null);
      if (values.length < period) return out;
      let sum = 0;
      for (let i = 0; i < period; i++) sum += values[i];
      out[period - 1] = sum / period;
      for (let i = period; i < values.length; i++) {
        sum += values[i] - values[i - period];
        out[i] = sum / period;
      }
      return out;
    }

    function computeEMA(values, period) {
      const out = new Array(values.length).fill(null);
      if (values.length < period) return out;
      const k = 2 / (period + 1);
      let sum = 0;
      for (let i = 0; i < period; i++) sum += values[i];
      let ema = sum / period;
      out[period - 1] = ema;
      for (let i = period; i < values.length; i++) {
        ema = values[i] * k + ema * (1 - k);
        out[i] = ema;
      }
      return out;
    }

    function computeMACD(closes, fast = 12, slow = 26, signal = 9) {
      const emaFast = computeEMA(closes, fast);
      const emaSlow = computeEMA(closes, slow);
      const macd = closes.map((_, i) =>
        emaFast[i] != null && emaSlow[i] != null ? emaFast[i] - emaSlow[i] : null
      );
      // Signal = EMA(signal) of the non-null MACD values.
      const macdDefined = macd.filter(v => v != null);
      const signalDefined = computeEMA(macdDefined, signal);
      const offset = macd.findIndex(v => v != null);
      const signalLine = new Array(macd.length).fill(null);
      if (offset >= 0) {
        for (let i = 0; i < signalDefined.length; i++) {
          if (signalDefined[i] != null) signalLine[offset + i] = signalDefined[i];
        }
      }
      const hist = macd.map((v, i) => (v != null && signalLine[i] != null ? v - signalLine[i] : null));
      return { macd, signal: signalLine, hist };
    }

    function computeOBV(candles) {
      const out = new Array(candles.length).fill(0);
      for (let i = 1; i < candles.length; i++) {
        const prev = out[i - 1];
        if (candles[i].close > candles[i - 1].close) out[i] = prev + candles[i].volume;
        else if (candles[i].close < candles[i - 1].close) out[i] = prev - candles[i].volume;
        else out[i] = prev;
      }
      return out;
    }

    /* ── Chart: render ── */
    function disposeChart() {
      if (_chartResizeObserver) { _chartResizeObserver.disconnect(); _chartResizeObserver = null; }
      if (_chartInstance) { try { _chartInstance.remove(); } catch {} _chartInstance = null; }
    }

    function setChartStatus(text, isError) {
      const status = document.getElementById('stock-chart-status');
      if (!status) return;
      status.textContent = text || '';
      status.style.display = text ? 'flex' : 'none';
      status.classList.toggle('error', !!isError);
    }

    async function renderCustomChart(ticker, grKey) {
      const container = document.getElementById('stock-chart');
      if (!container || _chartTicker !== ticker) return;

      disposeChart();
      setChartStatus('Loading chart…', false);

      let rawCandles;
      try {
        rawCandles = await fetchPolygonCandles(ticker);
      } catch (err) {
        if (_chartTicker === ticker) setChartStatus(`Chart unavailable — ${err.message}`, true);
        return;
      }
      if (_chartTicker !== ticker) return;
      if (!rawCandles.length) { setChartStatus('No data for this ticker.', true); return; }

      const candles = aggregateCandles(rawCandles, grKey || DEFAULT_GRANULARITY);
      // SMA(200) needs 200 prior bars, so always compute indicators against the full history
      // and only restrict the visible time range to the last VISIBLE_DAYS.
      const closes = candles.map(c => c.close);
      const sma9 = computeSMA(closes, 9);
      const sma50 = computeSMA(closes, 50);
      const sma200 = computeSMA(closes, 200);
      const macd = computeMACD(closes);
      const obv = computeOBV(candles);

      const toLine = arr => candles
        .map((c, i) => (arr[i] != null ? { time: c.time, value: arr[i] } : null))
        .filter(Boolean);
      const candleData = candles.map(c => ({ time: c.time, open: c.open, high: c.high, low: c.low, close: c.close }));
      const volumeData = candles.map(c => ({
        time: c.time, value: c.volume,
        color: c.close >= c.open ? 'rgba(0, 230, 230, 0.55)' : 'rgba(239, 68, 68, 0.55)',
      }));
      const histData = candles.map((c, i) => ({
        time: c.time,
        value: macd.hist[i] ?? 0,
        color: (macd.hist[i] ?? 0) >= 0 ? 'rgba(0, 230, 230, 0.6)' : 'rgba(239, 68, 68, 0.6)',
      }));
      const obvData = candles.map((c, i) => ({ time: c.time, value: obv[i] }));

      const chart = LightweightCharts.createChart(container, {
        layout: { background: { color: 'transparent' }, textColor: '#94a3b8', panes: { separatorColor: 'rgba(148,163,184,0.18)', separatorHoverColor: 'rgba(148,163,184,0.35)' } },
        grid: { vertLines: { color: 'rgba(148,163,184,0.08)' }, horzLines: { color: 'rgba(148,163,184,0.08)' } },
        rightPriceScale: { borderColor: 'rgba(148,163,184,0.15)' },
        timeScale: { borderColor: 'rgba(148,163,184,0.15)', timeVisible: false, secondsVisible: false },
        crosshair: { mode: 1 },
        autoSize: true,
      });
      _chartInstance = chart;

      // Pane 0 — price + SMAs
      const candleSeries = chart.addSeries(LightweightCharts.CandlestickSeries, {
        upColor: '#00e6e6', downColor: '#ef4444',
        borderUpColor: '#00e6e6', borderDownColor: '#ef4444',
        wickUpColor: '#00e6e6', wickDownColor: '#ef4444',
      }, 0);
      candleSeries.setData(candleData);

      const sma9Series  = chart.addSeries(LightweightCharts.LineSeries, { color: '#f59e0b', lineWidth: 1, priceLineVisible: false, lastValueVisible: false }, 0);
      const sma50Series = chart.addSeries(LightweightCharts.LineSeries, { color: '#a855f7', lineWidth: 1, priceLineVisible: false, lastValueVisible: false }, 0);
      const sma200Series= chart.addSeries(LightweightCharts.LineSeries, { color: '#38bdf8', lineWidth: 1, priceLineVisible: false, lastValueVisible: false }, 0);
      sma9Series.setData(toLine(sma9));
      sma50Series.setData(toLine(sma50));
      sma200Series.setData(toLine(sma200));

      // Pane 1 — volume
      const volSeries = chart.addSeries(LightweightCharts.HistogramSeries, {
        priceFormat: { type: 'volume' }, priceLineVisible: false, lastValueVisible: false,
      }, 1);
      volSeries.setData(volumeData);

      // Pane 2 — MACD
      const macdSeries   = chart.addSeries(LightweightCharts.LineSeries,      { color: '#00e6e6', lineWidth: 1, priceLineVisible: false, lastValueVisible: false }, 2);
      const signalSeries = chart.addSeries(LightweightCharts.LineSeries,      { color: '#f59e0b', lineWidth: 1, priceLineVisible: false, lastValueVisible: false }, 2);
      const histSeries   = chart.addSeries(LightweightCharts.HistogramSeries, { priceLineVisible: false, lastValueVisible: false }, 2);
      macdSeries.setData(toLine(macd.macd));
      signalSeries.setData(toLine(macd.signal));
      histSeries.setData(histData);

      // Pane 3 — OBV
      const obvSeries = chart.addSeries(LightweightCharts.LineSeries, {
        color: '#a855f7', lineWidth: 1, priceLineVisible: false, lastValueVisible: false,
      }, 3);
      obvSeries.setData(obvData);

      // Pane heights in pixels — must sum to a bit less than container height (720px)
      // to leave room for the time axis. Indicators set last so the main pane settles.
      const panes = chart.panes();
      if (panes[1]) panes[1].setHeight(85);
      if (panes[2]) panes[2].setHeight(115);
      if (panes[3]) panes[3].setHeight(115);
      if (panes[0]) panes[0].setHeight(360);

      const paneLegends = [
        [
          { color: '#00e6e6', label: 'PRICE' },
          { color: '#f59e0b', label: 'SMA 9' },
          { color: '#a855f7', label: 'SMA 50' },
          { color: '#38bdf8', label: 'SMA 200' },
        ],
        [{ color: 'rgba(0,230,230,0.55)', label: 'VOLUME' }],
        [
          { color: '#00e6e6', label: 'MACD' },
          { color: '#f59e0b', label: 'SIGNAL' },
          { color: 'rgba(0,230,230,0.6)', label: 'HIST' },
        ],
        [{ color: '#a855f7', label: 'OBV' }],
      ];
      paneLegends.forEach((items, i) => {
        const pane = panes[i];
        if (!pane) return;
        const el = pane.getHTMLElement();
        if (!el) return;
        const legend = document.createElement('div');
        legend.className = 'pane-legend';
        legend.innerHTML = items
          .map(it => `<span class="legend-item"><span class="legend-swatch" style="background:${it.color}"></span>${it.label}</span>`)
          .join('');
        el.appendChild(legend);
      });

      const lastTime = candles[candles.length - 1].time;
      const fromTime = lastTime - VISIBLE_DAYS * 86400;
      chart.timeScale().setVisibleRange({ from: fromTime, to: lastTime });

      setChartStatus('', false);
    }

    function renderWatchlist() { renderStubPage('stocks',    'Watchlist'); }
    function parseGainLoss(val) {
      if (val == null || val === '') return null;
      const str = String(val).trim();
      const n = parseFloat(str);
      if (isNaN(n)) return null;
      return str.endsWith('%') ? n : n * 100;
    }

    function formatCurrentPrice(val) {
      const n = parseFloat(val);
      return isNaN(n) ? '—' : `$${n.toFixed(2)}`;
    }

    function formatCostBasis(val) {
      const n = parseFloat(val);
      return isNaN(n) ? escapeHtml(val || '') : `$${n.toFixed(2)}`;
    }

    function formatGainLossCell(val) {
      const n = parseGainLoss(val);
      if (n == null) return '<span class="holdings-gain-empty">—</span>';
      const pct = n.toFixed(1);
      const sign = n > 0 ? '+' : '';
      const cls =
        n > 0 ? 'holdings-gain-pos' :
        n < 0 ? 'holdings-gain-neg' :
                'holdings-gain-zero';
      return `<span class="${cls}">${sign}${pct}%</span>`;
    }

    function sortHoldings(rows) {
      const dir = holdingsSortDir === 'asc' ? 1 : -1;
      return rows.slice().sort((a, b) => {
        if (holdingsSortKey === 'ticker') {
          return a.ticker.localeCompare(b.ticker) * dir;
        }
        if (holdingsSortKey === 'current_price') {
          const av = parseFloat(a.current_price);
          const bv = parseFloat(b.current_price);
          if (isNaN(av) && isNaN(bv)) return 0;
          if (isNaN(av)) return 1;
          if (isNaN(bv)) return -1;
          return (av - bv) * dir;
        }
        // gain_loss_pct / day_gain_loss_pct: blanks/non-numeric always last regardless of direction
        const av = parseGainLoss(a[holdingsSortKey]);
        const bv = parseGainLoss(b[holdingsSortKey]);
        if (av == null && bv == null) return 0;
        if (av == null) return 1;
        if (bv == null) return -1;
        return (av - bv) * dir;
      });
    }

    function renderHoldings() {
      document.getElementById('page').innerHTML = `
        <div class="holdings-page">
          <div class="holdings-header">
            <h1 class="feed-title">Holdings</h1>
            <input class="form-input holdings-search" id="holdings-search" type="text" placeholder="search ticker…" autocomplete="off" />
            <span class="feed-count holdings-count" id="holdings-count">— POSITIONS</span>
          </div>
          <div id="holdings-body">${[1,2,3,4].map(() => '<div class="skeleton" style="margin-bottom:8px;"></div>').join('')}</div>
        </div>`;

      document.getElementById('holdings-search').addEventListener('input', (e) => {
        holdingsFilter = e.target.value.trim().toLowerCase();
        renderHoldingsTable();
      });

      holdingsRows    = [];
      holdingsSortKey = 'day_gain_loss_pct';
      holdingsSortDir = 'desc';
      holdingsFilter  = '';
      Papa.parse(HOLDINGS_CSV_URL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete(results) {
          holdingsRows = results.data.filter(r => r.ticker);
          renderHoldingsTable();
        },
        error() {
          document.getElementById('holdings-body').innerHTML =
            '<div class="empty-state">Failed to load holdings. Check sheet permissions.</div>';
        },
      });
    }

    function renderHoldingsTable() {
      const body = document.getElementById('holdings-body');
      const count = document.getElementById('holdings-count');
      const total = holdingsRows.length;

      if (total === 0) {
        body.innerHTML = '<div class="empty-state">No holdings recorded.</div>';
        count.textContent = '0 POSITIONS';
        return;
      }

      const filtered = holdingsFilter
        ? holdingsRows.filter(r => r.ticker.toLowerCase().includes(holdingsFilter))
        : holdingsRows;

      count.textContent = holdingsFilter
        ? `${filtered.length} OF ${total} POSITIONS`
        : `${total} POSITIONS`;

      if (filtered.length === 0) {
        body.innerHTML = '<div class="empty-state">No matching tickers.</div>';
        return;
      }

      const sorted = sortHoldings(filtered);

      const arrow = (key) =>
        holdingsSortKey === key ? (holdingsSortDir === 'asc' ? ' ▲' : ' ▼') : '';
      const activeCls = (key) => holdingsSortKey === key ? ' active' : '';

      body.innerHTML = `
        <table class="holdings-table">
          <thead>
            <tr>
              <th class="sortable${activeCls('ticker')}" data-sort="ticker">TICKER${arrow('ticker')}</th>
              <th class="sortable${activeCls('current_price')}" data-sort="current_price">CURRENT PRICE${arrow('current_price')}</th>
              <th class="sortable${activeCls('day_gain_loss_pct')}" data-sort="day_gain_loss_pct">DAY GAIN/LOSS${arrow('day_gain_loss_pct')}</th>
              <th>COST BASIS</th>
              <th class="sortable${activeCls('gain_loss_pct')}" data-sort="gain_loss_pct">GAIN/LOSS${arrow('gain_loss_pct')}</th>
            </tr>
          </thead>
          <tbody>
            ${sorted.map(r => `
              <tr>
                <td class="holdings-ticker"><a class="ticker-link" href="#/stock/${encodeURIComponent(r.ticker)}">${escapeHtml(r.ticker)}</a></td>
                <td class="holdings-price">${formatCurrentPrice(r.current_price)}</td>
                <td>${formatGainLossCell(r.day_gain_loss_pct)}</td>
                <td class="holdings-cost">${formatCostBasis(r.cost_basis)}</td>
                <td>${formatGainLossCell(r.gain_loss_pct)}</td>
              </tr>`).join('')}
          </tbody>
        </table>`;

      body.querySelectorAll('th.sortable').forEach(th => {
        th.addEventListener('click', () => {
          const key = th.dataset.sort;
          if (holdingsSortKey === key) {
            holdingsSortDir = holdingsSortDir === 'asc' ? 'desc' : 'asc';
          } else {
            holdingsSortKey = key;
            holdingsSortDir = (key === 'gain_loss_pct' || key === 'day_gain_loss_pct') ? 'desc' : 'asc';
          }
          renderHoldingsTable();
        });
      });
    }
    function sortTransactions(rows) {
      const dir = transactionsSortDir === 'asc' ? 1 : -1;
      return rows.slice().sort((a, b) => {
        if (transactionsSortKey === 'ticker') return a.ticker.localeCompare(b.ticker) * dir;
        if (transactionsSortKey === 'type')   return a.type.localeCompare(b.type) * dir;
        if (transactionsSortKey === 'price') {
          return (parseFloat(a.price) - parseFloat(b.price)) * dir;
        }
        // date
        return a.date.localeCompare(b.date) * dir;
      });
    }

    function renderTransactions() {
      document.getElementById('page').innerHTML = `
        <div class="holdings-page">
          <div class="holdings-header">
            <h1 class="feed-title">Transactions</h1>
            <input class="form-input holdings-search" id="txn-search" type="text" placeholder="search ticker…" autocomplete="off" />
            <span class="feed-count holdings-count" id="txn-count">— TRANSACTIONS</span>
          </div>
          <div id="txn-body">${[1,2,3,4].map(() => '<div class="skeleton" style="margin-bottom:8px;"></div>').join('')}</div>
        </div>`;

      document.getElementById('txn-search').addEventListener('input', (e) => {
        transactionsFilter = e.target.value.trim().toLowerCase();
        renderTransactionsTable();
      });

      transactionsRows    = [];
      transactionsSortKey = 'date';
      transactionsSortDir = 'desc';
      transactionsFilter  = '';

      Papa.parse(TRANSACTIONS_CSV_URL, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete(results) {
          transactionsRows = results.data.filter(r => r.ticker);
          renderTransactionsTable();
        },
        error() {
          document.getElementById('txn-body').innerHTML =
            '<div class="empty-state">Failed to load transactions. Check sheet permissions.</div>';
        },
      });
    }

    function renderTransactionsTable() {
      const body  = document.getElementById('txn-body');
      const count = document.getElementById('txn-count');
      const total = transactionsRows.length;

      if (total === 0) {
        body.innerHTML = '<div class="empty-state">No transactions recorded.</div>';
        count.textContent = '0 TRANSACTIONS';
        return;
      }

      const filtered = transactionsFilter
        ? transactionsRows.filter(r => r.ticker.toLowerCase().includes(transactionsFilter))
        : transactionsRows;

      count.textContent = transactionsFilter
        ? `${filtered.length} OF ${total} TRANSACTIONS`
        : `${total} TRANSACTIONS`;

      if (filtered.length === 0) {
        body.innerHTML = '<div class="empty-state">No matching tickers.</div>';
        return;
      }

      const sorted = sortTransactions(filtered);

      const arrow = (key) => transactionsSortKey === key ? (transactionsSortDir === 'asc' ? ' ▲' : ' ▼') : '';
      const activeCls = (key) => transactionsSortKey === key ? ' active' : '';

      const typeBadge = (type) => {
        const t = (type || '').toLowerCase();
        if (t === 'buy')  return `<span class="badge badge-bull">BUY</span>`;
        if (t === 'sell') return `<span class="badge badge-bear">SELL</span>`;
        return `<span class="badge badge-neu">${escapeHtml(type)}</span>`;
      };

      body.innerHTML = `
        <table class="holdings-table">
          <thead>
            <tr>
              <th class="sortable${activeCls('date')}"   data-sort="date">DATE${arrow('date')}</th>
              <th class="sortable${activeCls('ticker')}" data-sort="ticker">TICKER${arrow('ticker')}</th>
              <th class="sortable${activeCls('price')}"  data-sort="price">PRICE${arrow('price')}</th>
              <th class="sortable${activeCls('type')}"   data-sort="type">TYPE${arrow('type')}</th>
            </tr>
          </thead>
          <tbody>
            ${sorted.map(r => `
              <tr>
                <td class="holdings-cost">${escapeHtml(formatDate(r.date))}</td>
                <td class="holdings-ticker"><a class="ticker-link" href="#/stock/${encodeURIComponent(r.ticker)}">${escapeHtml(r.ticker)}</a></td>
                <td class="holdings-price">${isNaN(parseFloat(r.price)) ? '—' : `$${parseFloat(r.price).toFixed(2)}`}</td>
                <td>${typeBadge(r.type)}</td>
              </tr>`).join('')}
          </tbody>
        </table>`;

      body.querySelectorAll('th.sortable').forEach(th => {
        th.addEventListener('click', () => {
          const key = th.dataset.sort;
          if (transactionsSortKey === key) {
            transactionsSortDir = transactionsSortDir === 'asc' ? 'desc' : 'asc';
          } else {
            transactionsSortKey = key;
            transactionsSortDir = key === 'date' ? 'desc' : 'asc';
          }
          renderTransactionsTable();
        });
      });
    }

    function renderNewSignal() {
      document.getElementById('page').innerHTML = `
        <div class="new-signal-page">
          <h1>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/>
            </svg>
            Inject New Signal
          </h1>
          <div class="form-card">
            <form id="new-signal-form">
              <div class="form-row cols-2">
                <div class="form-field">
                  <label class="form-label">ASSET TICKER</label>
                  <input class="form-input" name="ticker" type="text" placeholder="e.g. NVDA" required />
                </div>
                <div class="form-field">
                  <label class="form-label">AUTHOR</label>
                  <input class="form-input" name="author" type="text" placeholder="e.g. unusual_whales" required />
                </div>
              </div>
              <div class="form-row cols-2">
                <div class="form-field">
                  <label class="form-label">PLATFORM</label>
                  <input class="form-input" name="source" type="text" placeholder="e.g. X or TheStreet" required />
                </div>
                <div class="form-field">
                  <label class="form-label">SENTIMENT</label>
                  <select class="form-select" name="sentiment" required>
                    <option value="bullish">BULLISH</option>
                    <option value="bearish">BEARISH</option>
                    <option value="neutral">NEUTRAL</option>
                  </select>
                </div>
              </div>
              <div class="form-row">
                <div class="form-field">
                  <label class="form-label">SIGNAL CONTENT</label>
                  <textarea class="form-textarea" name="thesis" placeholder="> Enter signal content..." required></textarea>
                </div>
              </div>
              <div class="form-row cols-2">
                <div class="form-field">
                  <label class="form-label">SOURCE URL (OPTIONAL)</label>
                  <input class="form-input" name="source_url" type="url" placeholder="https://" />
                </div>
                <div class="form-field">
                  <label class="form-label">POST TIMESTAMP</label>
                  <input class="form-input" name="date" type="datetime-local" required />
                </div>
              </div>
              <div class="form-row cols-3">
                <div class="form-field">
                  <label class="form-label">ENTRY ($)</label>
                  <input class="form-input" name="entry" type="number" step="0.01" placeholder="Optional" />
                </div>
                <div class="form-field">
                  <label class="form-label">STOP ($)</label>
                  <input class="form-input stop-field" name="stop_loss" type="number" step="0.01" placeholder="Optional" />
                </div>
                <div class="form-field">
                  <label class="form-label">TARGET ($)</label>
                  <input class="form-input" name="target" type="number" step="0.01" placeholder="Optional" />
                </div>
              </div>
              <div class="form-actions">
                <button type="button" class="btn btn-outline" id="abort-btn">ABORT</button>
                <button type="submit" class="btn btn-primary" id="submit-btn">COMMIT SIGNAL</button>
              </div>
            </form>
          </div>
        </div>`;

      document.getElementById('abort-btn').addEventListener('click', () => navigate('#/signals'));
      document.getElementById('new-signal-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.textContent = 'INJECTING...';
        const data = Object.fromEntries(new FormData(e.target).entries());
        await submitSignal(data);
        btn.disabled = false;
        btn.textContent = 'COMMIT SIGNAL';
      });
    }

    /* ── WRITE STUB (auth deferred — write UI is hidden) ── */
    async function submitSignal(data) {
      // Stub: log to console until Sheets write auth is implemented.
      // When ready: POST to Sheets REST API appending row in column order:
      // date, author, source, source_url, ticker, entry, target, stop_loss, sentiment, thesis
      // raw_text column left blank for manual entries.
      console.log('submitSignal (stub):', data);
      alert('Write functionality is not yet enabled.');
    }

    /* ── ROUTER ── */
    const ROUTES = {
      '#/':             { render: renderDashboard,    path: '/dashboard',      },
      '#/signals':      { render: renderSignals,      path: '/signals',        },
      '#/stocks':       { render: renderWatchlist,    path: '/stocks',         },
      '#/holdings':     { render: renderHoldings,     path: '/holdings',       },
      '#/transactions': { render: renderTransactions, path: '/transactions',   },
      '#/signals/new':  { render: renderNewSignal,    path: '/signals/new',    },
    };

    function navigate(hash) {
      window.location.hash = hash;
    }

    function activeNavHash(hash) {
      if (hash.startsWith('#/signals/')) return '#/signals';
      if (hash.startsWith('#/stock/'))   return null;
      if (hash.startsWith('#/author/'))  return null;
      return hash;
    }

    function updateNav(hash) {
      const active = activeNavHash(hash);
      const navHtml = NAV_ITEMS.map(item => `
        <a class="nav-item${item.hash === active ? ' active' : ''}" href="${item.hash}">
          ${item.icon}${item.label}
        </a>`).join('');
      const drawerHtml = NAV_ITEMS.map(item => `
        <a class="nav-item${item.hash === active ? ' active' : ''}" href="${item.hash}" onclick="closeDrawer()">
          ${item.icon}${item.label}
        </a>`).join('');
      const bottomHtml = NAV_ITEMS.map(item => `
        <a class="bottom-nav-item${item.hash === active ? ' active' : ''}" href="${item.hash}">
          ${item.icon}${item.mobileLabel}
        </a>`).join('');

      document.getElementById('sidebar-nav').innerHTML = navHtml;
      document.getElementById('drawer-nav').innerHTML = drawerHtml;
      document.getElementById('bottom-nav').innerHTML = bottomHtml;

      if (hash.startsWith('#/stock/')) {
        const t = decodeURIComponent(hash.replace('#/stock/', ''));
        document.getElementById('header-path').textContent = `> /stock/${t}`;
      } else if (hash.startsWith('#/author/')) {
        const a = decodeURIComponent(hash.replace('#/author/', ''));
        document.getElementById('header-path').textContent = `> /author/@${a}`;
      } else {
        const route = ROUTES[hash] || ROUTES['#/'];
        document.getElementById('header-path').textContent = `> ${route.path}`;
      }
    }

    function handleRoute() {
      const hash = window.location.hash || '#/';
      updateNav(hash);
      if (hash.startsWith('#/stock/')) {
        const ticker = decodeURIComponent(hash.replace('#/stock/', ''));
        if (ticker) { renderStock(ticker); return; }
        ROUTES['#/'].render(); return;
      }
      if (hash.startsWith('#/author/')) {
        const author = decodeURIComponent(hash.replace('#/author/', ''));
        if (author) { renderAuthor(author); return; }
        ROUTES['#/'].render(); return;
      }
      const route = ROUTES[hash] || ROUTES['#/'];
      route.render();
    }

    /* ── MOBILE DRAWER ── */
    function openDrawer() {
      document.getElementById('drawer-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeDrawer() {
      document.getElementById('drawer-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    /* ── INIT ── */
    document.getElementById('hamburger-btn').addEventListener('click', openDrawer);
    document.getElementById('drawer-close').addEventListener('click', closeDrawer);
    document.getElementById('drawer-backdrop').addEventListener('click', closeDrawer);

    window.addEventListener('hashchange', () => { if (currentUser) handleRoute(); });
    window.addEventListener('DOMContentLoaded', () => {
      if (!window.location.hash) window.location.hash = '#/';
      initAuth();
    });
  </script>
</body>
